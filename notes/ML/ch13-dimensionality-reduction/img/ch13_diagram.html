<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: white; font-family: "Segoe UI", Arial, sans-serif; }</style>
</head>
<body>
<svg width="1400" height="900" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="900" fill="white"/>

    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2C3E50"/></marker>

  <!-- Title -->

  <line x1="460" y1="60" x2="460" y2="860" stroke="#BDC3C7" stroke-width="1.5"/>

  <circle cx="375" cy="140" r="6" fill="#85C1E9" opacity="0.8"/>

  <text x="378" y="130" font-size="11" font-weight="bold" fill="#E74C3C">PC1</text>
  <text x="378" y="144" font-size="10" fill="#E74C3C">(max variance)</text>
  <!-- PC2 arrow: perpendicular, shorter -->

  <text x="285" y="335" font-size="11" font-weight="bold" fill="#1E8449">PC2</text>

  <!-- projected from scatter onto PC1 line -->

  <!-- Reconstruction note -->
  <rect x="45" y="380" width="400" height="52" rx="7" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1"/>
  <text x="245" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A5276">PCA: C = XᵀX  →  Eigendecomposition  →  Project onto top-k PCs</text>
  <text x="245" y="418" text-anchor="middle" font-size="11" fill="#333">EVR_i = λᵢ / Σλⱼ  |  Only PCA is invertible: X̂ = Z·Vₖᵀ + x̄</text>

  <!-- Explained Variance bar chart -->
  <text x="230" y="455" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C3E50">Explained Variance Ratio</text>

  <line x1="55"  y1="720" x2="55"  y2="470" stroke="#2C3E50" stroke-width="1.8" marker-end="url(#arr)"/>

  <text x="240" y="745" text-anchor="middle" font-size="11" fill="#555">Principal Component</text>

  <text x="331" y="735" text-anchor="middle" font-size="9" fill="#555">PC5</text>
  <text x="389" y="735" text-anchor="middle" font-size="9" fill="#555">PC6</text>
  <!-- Threshold line -->
  <line x1="55" y1="600" x2="435" y2="600" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="438" y="596" font-size="9" fill="#E74C3C">keep above</text>
  <text x="438" y="608" font-size="9" fill="#E74C3C">→ 95% cum.</text>

  <text x="695" y="78" text-anchor="middle" font-size="16" font-weight="bold" fill="#2C3E50">t-SNE</text>

  <circle cx="560" cy="185" r="9" fill="#E74C3C" opacity="0.9"/>

  <!-- Yellow cluster -->
  <circle cx="790" cy="350" r="9" fill="#F1C40F" opacity="0.9"/>

  <rect x="470" y="620" width="440" height="90" rx="8" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1.2"/>
  <text x="690" y="642" text-anchor="middle" font-size="12" font-weight="bold" fill="#922B21">t-SNE — Key Properties</text>
  <text x="480" y="662" font-size="11" fill="#333">✓  Preserves LOCAL neighbourhood structure (tight clusters)</text>
  <text x="480" y="678" font-size="11" fill="#E74C3C">✗  Distances BETWEEN clusters are meaningless</text>
  <text x="480" y="694" font-size="11" fill="#E74C3C">✗  Non-deterministic · Slow at large scale (&gt;50k points)</text>

  ════════════════════════════════════ -->

  <!-- UMAP note box -->
  <rect x="940" y="740" width="440" height="90" rx="8" fill="#E9F7EF" stroke="#1E8449" stroke-width="1.2"/>
  <text x="1160" y="762" text-anchor="middle" font-size="12" font-weight="bold" fill="#196F3D">UMAP — Key Properties</text>
  <text x="950" y="782" font-size="11" fill="#333">✓  Preserves LOCAL + GLOBAL structure</text>
  <text x="950" y="798" font-size="11" fill="#333">✓  Faster than t-SNE at large scale</text>
  <text x="950" y="814" font-size="11" fill="#1E8449">✓  Can be used as feature transformer for downstream ML</text>

  <!-- Comparison table (bottom strip spanning all 3 panels) -->

  <text x="700" y="860" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C3E50">PCA vs t-SNE vs UMAP</text>
  <text x="700" y="878" text-anchor="middle" font-size="11" fill="#555" font-style="italic">PCA: linear, deterministic, invertible, fastest — best for preprocessing &amp; variance analysis. t-SNE: beautiful local clusters, slow, distances between clusters meaningless. UMAP: best balance — fast, global+local structure, usable for downstream ML.</text>
