<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: white; font-family: "Segoe UI", Arial, sans-serif; }</style>
</head>
<body>
<svg width="1400" height="920" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="920" fill="white"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2C3E50"/></marker>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#E74C3C"/></marker>
  </defs>

  <!-- Title -->
  <text x="700" y="44" text-anchor="middle" font-size="26" font-weight="bold" fill="#1A1A2E">Clustering: K-Means, DBSCAN &amp; HDBSCAN</text>

  <!-- ══ Divider ══ -->
  <line x1="700" y1="60" x2="700" y2="870" stroke="#BDC3C7" stroke-width="1.5"/>

  <!-- ════════════════════════════════════
       LEFT — K-Means 4-panel + Elbow
  ════════════════════════════════════ -->

  <text x="350" y="78" text-anchor="middle" font-size="16" font-weight="bold" fill="#2C3E50">K-Means (Lloyd's Algorithm)</text>

  <!-- 2×2 grid of sub-panels -->
  <!-- Panel borders -->
  <rect x="30"  y="90"  width="320" height="250" rx="6" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1"/>
  <rect x="360" y="90"  width="320" height="250" rx="6" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1"/>
  <rect x="30"  y="350" width="320" height="250" rx="6" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1"/>
  <rect x="360" y="350" width="320" height="250" rx="6" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1"/>

  <!-- Sub-panel titles -->
  <text x="190" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">Step 1 — Random Initialisation</text>
  <text x="520" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">Step 2 — Assign to Nearest Centroid</text>
  <text x="190" y="370" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">Step 3 — Recompute Centroids</text>
  <text x="520" y="370" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">Step 4 — Converged ✓</text>

  <!-- ── Panel 1: grey dots + 3 random centroids ── -->
  <!-- Grey data dots -->
  <circle cx="80"  cy="180" r="6" fill="#AAA"/>
  <circle cx="110" cy="210" r="6" fill="#AAA"/>
  <circle cx="140" cy="160" r="6" fill="#AAA"/>
  <circle cx="90"  cy="240" r="6" fill="#AAA"/>
  <circle cx="130" cy="290" r="6" fill="#AAA"/>
  <circle cx="160" cy="250" r="6" fill="#AAA"/>
  <circle cx="200" cy="180" r="6" fill="#AAA"/>
  <circle cx="240" cy="150" r="6" fill="#AAA"/>
  <circle cx="270" cy="200" r="6" fill="#AAA"/>
  <circle cx="250" cy="250" r="6" fill="#AAA"/>
  <circle cx="220" cy="290" r="6" fill="#AAA"/>
  <circle cx="290" cy="270" r="6" fill="#AAA"/>
  <circle cx="170" cy="190" r="6" fill="#AAA"/>
  <circle cx="310" cy="180" r="6" fill="#AAA"/>
  <circle cx="315" cy="230" r="6" fill="#AAA"/>
  <!-- 3 random centroids (triangles) -->
  <polygon points="100,135 110,155 90,155" fill="#E74C3C"/>
  <polygon points="270,145 280,165 260,165" fill="#1E8449"/>
  <polygon points="180,300 190,320 170,320" fill="#2E86C1"/>
  <text x="60"  y="133" font-size="9" fill="#E74C3C">μ₁</text>
  <text x="282" y="143" font-size="9" fill="#1E8449">μ₂</text>
  <text x="192" y="298" font-size="9" fill="#2E86C1">μ₃</text>

  <!-- ── Panel 2: colored by nearest centroid ── -->
  <!-- Red cluster (top-left) -->
  <circle cx="410" cy="180" r="6" fill="#E74C3C" opacity="0.8"/>
  <circle cx="440" cy="210" r="6" fill="#E74C3C" opacity="0.8"/>
  <circle cx="470" cy="160" r="6" fill="#E74C3C" opacity="0.8"/>
  <circle cx="420" cy="240" r="6" fill="#E74C3C" opacity="0.8"/>
  <circle cx="500" cy="180" r="6" fill="#E74C3C" opacity="0.8"/>
  <!-- Green cluster (top-right) -->
  <circle cx="570" cy="150" r="6" fill="#1E8449" opacity="0.8"/>
  <circle cx="600" cy="180" r="6" fill="#1E8449" opacity="0.8"/>
  <circle cx="630" cy="200" r="6" fill="#1E8449" opacity="0.8"/>
  <circle cx="610" cy="220" r="6" fill="#1E8449" opacity="0.8"/>
  <circle cx="645" cy="170" r="6" fill="#1E8449" opacity="0.8"/>
  <!-- Blue cluster (bottom) -->
  <circle cx="460" cy="260" r="6" fill="#2E86C1" opacity="0.8"/>
  <circle cx="490" cy="280" r="6" fill="#2E86C1" opacity="0.8"/>
  <circle cx="520" cy="295" r="6" fill="#2E86C1" opacity="0.8"/>
  <circle cx="550" cy="275" r="6" fill="#2E86C1" opacity="0.8"/>
  <circle cx="490" cy="310" r="6" fill="#2E86C1" opacity="0.8"/>
  <!-- Centroid markers -->
  <polygon points="430,135 440,155 420,155" fill="#E74C3C"/>
  <polygon points="598,143 608,163 588,163" fill="#1E8449"/>
  <polygon points="500,305 510,325 490,325" fill="#2E86C1"/>

  <!-- ── Panel 3: arrows showing centroid movement ── -->
  <!-- Same colored dots -->
  <circle cx="80"  cy="440" r="6" fill="#E74C3C" opacity="0.8"/>
  <circle cx="110" cy="470" r="6" fill="#E74C3C" opacity="0.8"/>
  <circle cx="140" cy="420" r="6" fill="#E74C3C" opacity="0.8"/>
  <circle cx="90"  cy="500" r="6" fill="#E74C3C" opacity="0.8"/>
  <circle cx="160" cy="440" r="6" fill="#E74C3C" opacity="0.8"/>
  <circle cx="240" cy="415" r="6" fill="#1E8449" opacity="0.8"/>
  <circle cx="270" cy="445" r="6" fill="#1E8449" opacity="0.8"/>
  <circle cx="300" cy="420" r="6" fill="#1E8449" opacity="0.8"/>
  <circle cx="310" cy="460" r="6" fill="#1E8449" opacity="0.8"/>
  <circle cx="280" cy="475" r="6" fill="#1E8449" opacity="0.8"/>
  <circle cx="130" cy="540" r="6" fill="#2E86C1" opacity="0.8"/>
  <circle cx="160" cy="560" r="6" fill="#2E86C1" opacity="0.8"/>
  <circle cx="200" cy="550" r="6" fill="#2E86C1" opacity="0.8"/>
  <circle cx="230" cy="565" r="6" fill="#2E86C1" opacity="0.8"/>
  <circle cx="170" cy="580" r="6" fill="#2E86C1" opacity="0.8"/>
  <!-- old centroid (ghost) + new centroid (solid) with arrow -->
  <!-- Red: old at 100,410 → new at 116,454 -->
  <circle cx="100" cy="408" r="10" fill="none" stroke="#E74C3C" stroke-dasharray="4,3" stroke-width="1.5" opacity="0.6"/>
  <circle cx="116" cy="454" r="10" fill="#E74C3C"/>
  <line x1="100" y1="418" x2="112" y2="444" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <!-- Green: old at 285,430 → new at 280,452 -->
  <circle cx="285" cy="428" r="10" fill="none" stroke="#1E8449" stroke-dasharray="4,3" stroke-width="1.5" opacity="0.6"/>
  <circle cx="280" cy="450" r="10" fill="#1E8449"/>
  <!-- Blue: old similar -->
  <circle cx="200" cy="553" r="10" fill="#2E86C1"/>

  <!-- ── Panel 4: Converged ── -->
  <!-- Red cluster -->
  <circle cx="410" cy="440" r="6" fill="#E74C3C" opacity="0.85"/>
  <circle cx="440" cy="470" r="6" fill="#E74C3C" opacity="0.85"/>
  <circle cx="470" cy="420" r="6" fill="#E74C3C" opacity="0.85"/>
  <circle cx="425" cy="500" r="6" fill="#E74C3C" opacity="0.85"/>
  <circle cx="455" cy="445" r="6" fill="#E74C3C" opacity="0.85"/>
  <circle cx="440" cy="455" r="11" fill="#E74C3C"/> <!-- centroid -->
  <!-- Green cluster -->
  <circle cx="570" cy="420" r="6" fill="#1E8449" opacity="0.85"/>
  <circle cx="600" cy="445" r="6" fill="#1E8449" opacity="0.85"/>
  <circle cx="635" cy="465" r="6" fill="#1E8449" opacity="0.85"/>
  <circle cx="610" cy="410" r="6" fill="#1E8449" opacity="0.85"/>
  <circle cx="650" cy="440" r="6" fill="#1E8449" opacity="0.85"/>
  <circle cx="613" cy="436" r="11" fill="#1E8449"/>
  <!-- Blue cluster -->
  <circle cx="490" cy="540" r="6" fill="#2E86C1" opacity="0.85"/>
  <circle cx="520" cy="565" r="6" fill="#2E86C1" opacity="0.85"/>
  <circle cx="550" cy="545" r="6" fill="#2E86C1" opacity="0.85"/>
  <circle cx="480" cy="576" r="6" fill="#2E86C1" opacity="0.85"/>
  <circle cx="525" cy="585" r="6" fill="#2E86C1" opacity="0.85"/>
  <circle cx="513" cy="562" r="11" fill="#2E86C1"/>
  <!-- Centroid labels -->
  <text x="450" y="452" font-size="9" fill="white" text-anchor="middle" font-weight="bold">μ₁</text>
  <text x="613" y="432" font-size="9" fill="white" text-anchor="middle" font-weight="bold">μ₂</text>
  <text x="513" y="558" font-size="9" fill="white" text-anchor="middle" font-weight="bold">μ₃</text>

  <!-- ── Elbow plot ── -->
  <text x="350" y="628" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50">Elbow Method — Choosing K</text>

  <!-- Axes -->
  <line x1="50"  y1="820" x2="50"  y2="650" stroke="#2C3E50" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="50"  y1="820" x2="670" y2="820" stroke="#2C3E50" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="360" y="848" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C3E50">K (number of clusters)</text>
  <text x="22"  y="740" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C3E50" transform="rotate(-90,22,740)">Inertia</text>
  <!-- tick labels -->
  <text x="95"  y="835" text-anchor="middle" font-size="10" fill="#555">1</text>
  <text x="185" y="835" text-anchor="middle" font-size="10" fill="#555">2</text>
  <text x="275" y="835" text-anchor="middle" font-size="10" fill="#555">3</text>
  <text x="365" y="835" text-anchor="middle" font-size="10" fill="#555">4</text>
  <text x="455" y="835" text-anchor="middle" font-size="10" fill="#555">5</text>
  <text x="545" y="835" text-anchor="middle" font-size="10" fill="#555">6</text>
  <!-- Elbow curve -->
  <path d="M95,660 C140,680 175,720 275,760 C350,788 430,806 545,815"
        fill="none" stroke="#2E86C1" stroke-width="2.5"/>
  <!-- Elbow dashed vertical at K=3 -->
  <line x1="275" y1="650" x2="275" y2="820" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="286" y="668" font-size="11" fill="#E74C3C" font-weight="bold">Elbow k=3</text>
  <circle cx="275" cy="760" r="7" fill="#E74C3C"/>

  <!-- ════════════════════════════════════
       RIGHT — DBSCAN
  ════════════════════════════════════ -->

  <text x="1050" y="78" text-anchor="middle" font-size="16" font-weight="bold" fill="#2C3E50">DBSCAN — Density-Based Clustering</text>

  <!-- Scatter axes -->
  <line x1="720" y1="760" x2="720" y2="100" stroke="#2C3E50" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="720" y1="760" x2="1360" y2="760" stroke="#2C3E50" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Two crescent-shaped density clusters -->
  <!-- Cluster A (green core points) — upper arc -->
  <!-- Core points (dark green, fully opaque) -->
  <circle cx="850"  cy="200" r="10" fill="#1E8449"/>
  <circle cx="890"  cy="175" r="10" fill="#1E8449"/>
  <circle cx="930"  cy="165" r="10" fill="#1E8449"/>
  <circle cx="970"  cy="170" r="10" fill="#1E8449"/>
  <circle cx="1010" cy="185" r="10" fill="#1E8449"/>
  <circle cx="1040" cy="210" r="10" fill="#1E8449"/>
  <circle cx="1055" cy="250" r="10" fill="#1E8449"/>
  <circle cx="1040" cy="290" r="10" fill="#1E8449"/>
  <circle cx="1010" cy="310" r="10" fill="#1E8449"/>
  <!-- Border points (light green) -->
  <circle cx="820"  cy="225" r="10" fill="#82E0AA"/>
  <circle cx="825"  cy="260" r="10" fill="#82E0AA"/>
  <circle cx="840"  cy="165" r="10" fill="#82E0AA"/>
  <circle cx="1070" cy="225" r="10" fill="#82E0AA"/>

  <!-- ε radius circle around one core point to illustrate concept -->
  <circle cx="930" cy="165" r="55" fill="none" stroke="#7D3C98" stroke-width="2" stroke-dasharray="9,5"/>
  <line x1="930" y1="165" x2="985" y2="165" stroke="#7D3C98" stroke-width="1.5"/>
  <text x="942" y="157" font-size="11" fill="#7D3C98" font-weight="bold">ε</text>

  <!-- Cluster B (blue core points) — lower arc -->
  <circle cx="800"  cy="580" r="10" fill="#2E86C1"/>
  <circle cx="840"  cy="560" r="10" fill="#2E86C1"/>
  <circle cx="880"  cy="545" r="10" fill="#2E86C1"/>
  <circle cx="920"  cy="540" r="10" fill="#2E86C1"/>
  <circle cx="960"  cy="545" r="10" fill="#2E86C1"/>
  <circle cx="1000" cy="565" r="10" fill="#2E86C1"/>
  <circle cx="1035" cy="595" r="10" fill="#2E86C1"/>
  <circle cx="1050" cy="635" r="10" fill="#2E86C1"/>
  <circle cx="1020" cy="670" r="10" fill="#2E86C1"/>
  <!-- Border points -->
  <circle cx="775"  cy="615" r="10" fill="#85C1E9"/>
  <circle cx="1060" cy="670" r="10" fill="#85C1E9"/>

  <!-- Noise points (black X) -->
  <line x1="1150" y1="355" x2="1172" y2="377" stroke="#2C3E50" stroke-width="3" stroke-linecap="round"/>
  <line x1="1172" y1="355" x2="1150" y2="377" stroke="#2C3E50" stroke-width="3" stroke-linecap="round"/>
  <text x="1185" y="373" font-size="11" fill="#2C3E50">Noise</text>

  <line x1="1220" y1="480" x2="1242" y2="502" stroke="#2C3E50" stroke-width="3" stroke-linecap="round"/>
  <line x1="1242" y1="480" x2="1220" y2="502" stroke="#2C3E50" stroke-width="3" stroke-linecap="round"/>

  <line x1="760"  cy="400" x2="760"  y2="400" stroke="#2C3E50" stroke-width="3"/>
  <line x1="748"  y1="415" x2="770" y2="437" stroke="#2C3E50" stroke-width="3" stroke-linecap="round"/>
  <line x1="770"  y1="415" x2="748" y2="437" stroke="#2C3E50" stroke-width="3" stroke-linecap="round"/>

  <!-- Cluster labels -->
  <text x="1080" y="240" font-size="13" font-weight="bold" fill="#1E8449">Cluster A</text>
  <text x="1080" y="625" font-size="13" font-weight="bold" fill="#2E86C1">Cluster B</text>
  <text x="900"  y="420" text-anchor="middle" font-size="11" fill="#888" font-style="italic">(low-density region between clusters)</text>

  <!-- Legend -->
  <rect x="720" y="780" width="620" height="75" rx="8" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1"/>
  <circle cx="745" cy="802" r="9" fill="#1E8449"/>
  <text x="760" y="806" font-size="11" fill="#333">Core point (≥ MinPts neighbours within ε)</text>
  <circle cx="745" cy="825" r="9" fill="#82E0AA"/>
  <text x="760" y="829" font-size="11" fill="#333">Border point (within ε of a core point, but fewer neighbours)</text>
  <line x1="735" y1="843" x2="757" y2="865" stroke="#2C3E50" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="757" y1="843" x2="735" y2="865" stroke="#2C3E50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="760" y="858" font-size="11" fill="#333">Noise point (not within ε of any core point) → label = −1</text>

  <!-- HDBSCAN vs DBSCAN mini-table -->
  <rect x="1060" y="780" width="320" height="100" rx="8" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.2"/>
  <text x="1220" y="800" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A5276">DBSCAN vs HDBSCAN</text>
  <text x="1075" y="818" font-size="11" fill="#333">DBSCAN:   needs ε + MinPts</text>
  <text x="1075" y="834" font-size="11" fill="#333">            sensitive to ε choice</text>
  <text x="1075" y="852" font-size="11" fill="#333">HDBSCAN: needs only min_cluster_size</text>
  <text x="1075" y="868" font-size="11" fill="#1E8449">            handles varying density ✓</text>

  <!-- Caption -->
  <rect x="30" y="880" width="1340" height="30" rx="6" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1"/>
  <text x="700" y="899" text-anchor="middle" font-size="11" fill="#555" font-style="italic">K-Means minimises inertia Σ‖xᵢ−μₖ‖² (use elbow method to pick K). DBSCAN finds arbitrary-shaped clusters and marks outliers as noise. HDBSCAN extends this to varying-density data.</text>
</svg>
</body>
</html>
