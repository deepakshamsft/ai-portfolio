version: '3.8'

services:
  api:
    build: .
    image: segmentai:latest
    container_name: segmentai-api
    ports:
      - "5000:5000"
      - "9090:9090"
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - segmentai-network

  prometheus:
    image: prom/prometheus:latest
    container_name: segmentai-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - segmentai-network
    depends_on:
      - api

networks:
  segmentai-network:
    driver: bridge

volumes:
  prometheus-data:
