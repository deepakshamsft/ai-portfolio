version: '3.8'

services:
  pizzabot:
    build: .
    container_name: pizzabot_app
    ports:
      - "5000:5000"
      - "9090:9090"
    environment:
      - FLASK_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped
    networks:
      - pizzabot_network

  prometheus:
    image: prom/prometheus:latest
    container_name: pizzabot_prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - pizzabot_network

  grafana:
    image: grafana/grafana:latest
    container_name: pizzabot_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - pizzabot_network

volumes:
  prometheus_data:
  grafana_data:

networks:
  pizzabot_network:
    driver: bridge
