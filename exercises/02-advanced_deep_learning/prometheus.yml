# Prometheus Configuration for ProductionCV

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'productioncv'

# Scrape configurations
scrape_configs:
  # ProductionCV API metrics
  - job_name: 'productioncv-api'
    static_configs:
      - targets: ['api:9090']
        labels:
          service: 'productioncv'
          environment: 'production'
    
    # Metric relabeling
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'productioncv_.*'
        action: keep

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
