# Prometheus configuration for multi-agent system monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'multiagent-system'

scrape_configs:
  # Multi-agent API metrics
  - job_name: 'multiagent-api'
    static_configs:
      - targets: ['multiagent-api:5000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    
  # Redis metrics (if redis_exporter is added)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
